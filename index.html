<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astral Forge • Mail</title>
<style>
body{
  background:#0b0b0f;
  color:#e5e5e5;
  font-family:system-ui;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.panel{
  background:#111118;
  border:1px solid #2a2a35;
  border-radius:12px;
  padding:40px;
  text-align:center;
  width:420px;
}

h1{
  margin-bottom:10px;
}

button{
  margin-top:20px;
  padding:12px 20px;
  background:#3c6cff;
  border:none;
  border-radius:8px;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#5a82ff;
}
</style>
</head>

<body>

<div class="panel">
<h1>📬 Astral Forge Mail</h1>
<p>Secure gateway to your Astral Forge mailbox.</p>

<button onclick="openMail()">Open Mail</button>

<p style="margin-top:20px;font-size:12px;opacity:.6">
scribe@astralforge.studio
</p>
</div>

<script>
function openMail(){
  window.location.href="https://app.neo.space/mail/";
}
</script>

</body>
</html>
